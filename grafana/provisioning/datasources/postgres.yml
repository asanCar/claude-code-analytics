apiVersion: 1

datasources:
  - name: PostgreSQL
    type: postgres
    uid: postgresql
    access: proxy
    url: postgres:5432
    database: claude_analytics
    user: claude
    secureJsonData:
      password: $POSTGRES_PASSWORD
    jsonData:
      database: claude_analytics
      sslmode: disable
      maxOpenConns: 5
      maxIdleConns: 2
      connMaxLifetime: 14400
      postgresVersion: 1600
    isDefault: true
    editable: false
